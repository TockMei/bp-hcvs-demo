<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>診断</title></head>
<body>
<pre id="log" style="font-size:14px;padding:20px;white-space:pre-wrap;"></pre>

<script>
var log = document.getElementById("log");
function L(msg) { log.textContent += msg + "\n"; }
window.onerror = function(m,s,l,c,e) { L("GLOBAL ERROR: " + m + " at " + s + ":" + l); };
L("1. HTML loaded");
</script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"
  onload="L('2. React loaded: ' + typeof React)"
  onerror="L('2. React FAILED to load')"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
  onload="L('3. ReactDOM loaded: ' + typeof ReactDOM)"
  onerror="L('3. ReactDOM FAILED to load')"></script>

<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"
  onload="L('4. Recharts loaded: ' + typeof Recharts)"
  onerror="L('4. Recharts FAILED to load')"></script>

<script>
L("5. Inline script running");
L("   React: " + typeof React);
L("   ReactDOM: " + typeof ReactDOM);
L("   Recharts: " + typeof Recharts);
if (typeof Recharts !== "undefined") {
  L("   Recharts keys: " + Object.keys(Recharts).slice(0,10).join(", "));
}
try {
  var el = React.createElement("div", null, "React works!");
  var root = ReactDOM.createRoot(document.createElement("div"));
  L("6. React.createElement OK");
} catch(e) {
  L("6. React ERROR: " + e.message);
}
</script>
</body>
</html>
